version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - echo "RESEND_API_KEY=$RESEND_API_KEY" >> .env.production
        - echo "SANITY_API_TOKEN=$SANITY_API_TOKEN" >> .env.production
        - echo "SANITY_REVALIDATE_SECRET=$SANITY_REVALIDATE_SECRET" >> .env.production
        - echo "CONTACT_FROM_EMAIL=$CONTACT_FROM_EMAIL" >> .env.production
        - echo "CONTACT_TO_EMAIL=$CONTACT_TO_EMAIL" >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
