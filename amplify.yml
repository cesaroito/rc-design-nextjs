version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - env | grep -e SES_REGION -e SES_ACCESS_KEY_ID -e SES_SECRET_ACCESS_KEY -e CONTACT_FROM_EMAIL -e CONTACT_TO_EMAIL -e SANITY_API_TOKEN -e SANITY_REVALIDATE_SECRET >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
